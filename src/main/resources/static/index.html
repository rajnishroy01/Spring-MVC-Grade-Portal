<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome - Grade Portal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Animated Gradient Background */
      .gradient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        z-index: -3;
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Floating Bubbles */
      .bubble {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        animation: float 6s ease-in-out infinite;
      }

      .bubble:nth-child(1) {
        width: 80px;
        height: 80px;
        left: 10%;
        top: 20%;
        animation-delay: 0s;
      }

      .bubble:nth-child(2) {
        width: 120px;
        height: 120px;
        left: 80%;
        top: 60%;
        animation-delay: 2s;
      }

      .bubble:nth-child(3) {
        width: 60px;
        height: 60px;
        left: 60%;
        top: 10%;
        animation-delay: 4s;
      }

      .bubble:nth-child(4) {
        width: 100px;
        height: 100px;
        left: 20%;
        top: 70%;
        animation-delay: 1s;
      }

      .bubble:nth-child(5) {
        width: 50px;
        height: 50px;
        left: 85%;
        top: 25%;
        animation-delay: 3s;
      }

      .bubble:nth-child(6) {
        width: 90px;
        height: 90px;
        left: 5%;
        top: 50%;
        animation-delay: 5s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.6;
        }
        50% {
          transform: translateY(-30px) scale(1.1);
          opacity: 0.9;
        }
      }

      /* Rotating Circles */
      .circle-container {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: -1;
      }

      .orbit {
        position: absolute;
        top: 50%;
        left: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }

      .orbit-1 {
        width: 300px;
        height: 300px;
        animation: rotate 20s linear infinite;
      }

      .orbit-2 {
        width: 450px;
        height: 450px;
        animation: rotate 30s linear infinite reverse;
        border-style: dashed;
      }

      .orbit-3 {
        width: 600px;
        height: 600px;
        animation: rotate 40s linear infinite;
        border-style: dotted;
      }

      @keyframes rotate {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      /* Main Container */
      .container {
        text-align: center;
        padding: 60px 80px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
      }

      .container::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(
          from 0deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        animation: spin 10s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Welcome Text */
      .welcome-text {
        font-size: 72px;
        font-weight: 800;
        color: white;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        margin-bottom: 20px;
        animation:
          pulse 2s ease-in-out infinite,
          fadeInDown 1s ease-out;
        position: relative;
        z-index: 1;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        50% {
          transform: scale(1.05);
          text-shadow: 0 0 40px rgba(255, 255, 255, 0.8);
        }
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-50px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Subtitle */
      .subtitle {
        font-size: 24px;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 40px;
        animation: fadeInUp 1s ease-out 0.3s both;
        position: relative;
        z-index: 1;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Buttons Container */
      .buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
        position: relative;
        z-index: 1;
      }

      /* Button Styles */
      .btn {
        padding: 18px 40px;
        font-size: 18px;
        font-weight: 600;
        text-decoration: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-primary {
        background: linear-gradient(45deg, #ff6b6b, #feca57);
        color: white;
        border: none;
        box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        animation: slideInLeft 0.8s ease-out 0.5s both;
      }

      .btn-primary:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 20px 40px rgba(255, 107, 107, 0.6);
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-100px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .btn-secondary {
        background: transparent;
        color: white;
        border: 2px solid white;
        animation: slideInRight 0.8s ease-out 0.7s both;
      }

      .btn-secondary:hover {
        background: white;
        color: #333;
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 20px 40px rgba(255, 255, 255, 0.3);
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(100px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Glowing Stars */
      .star {
        position: absolute;
        width: 4px;
        height: 4px;
        background: white;
        border-radius: 50%;
        animation: twinkle 2s ease-in-out infinite;
      }

      .star:nth-child(1) {
        top: 10%;
        left: 20%;
        animation-delay: 0s;
      }
      .star:nth-child(2) {
        top: 20%;
        left: 80%;
        animation-delay: 0.5s;
      }
      .star:nth-child(3) {
        top: 70%;
        left: 15%;
        animation-delay: 1s;
      }
      .star:nth-child(4) {
        top: 80%;
        left: 85%;
        animation-delay: 1.5s;
      }
      .star:nth-child(5) {
        top: 40%;
        left: 90%;
        animation-delay: 0.3s;
      }
      .star:nth-child(6) {
        top: 15%;
        left: 50%;
        animation-delay: 0.8s;
      }
      .star:nth-child(7) {
        top: 60%;
        left: 5%;
        animation-delay: 1.2s;
      }
      .star:nth-child(8) {
        top: 35%;
        left: 70%;
        animation-delay: 0.7s;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.5);
        }
        50% {
          opacity: 1;
          transform: scale(1.5);
        }
      }

      /* Decorative Lines */
      .line {
        position: absolute;
        background: rgba(255, 255, 255, 0.3);
      }

      .line-horizontal {
        width: 100px;
        height: 2px;
        animation: expandWidth 1s ease-out 1s both;
      }

      .line-horizontal.left {
        top: 50%;
        left: -120px;
      }
      .line-horizontal.right {
        top: 50%;
        right: -120px;
      }

      @keyframes expandWidth {
        from {
          width: 0;
        }
        to {
          width: 100px;
        }
      }

      /* Hover Ripple Effect */
      .btn::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .btn:active::after {
        width: 300px;
        height: 300px;
      }

      /* Bouncing Arrow */
      .arrow {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 30px;
        color: white;
        animation: bounce 2s ease-in-out infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(10px);
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated Gradient Background -->
    <div class="gradient-bg"></div>

    <!-- Floating Bubbles -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <!-- Rotating Orbits -->
    <div class="circle-container">
      <div class="orbit orbit-1"></div>
      <div class="orbit orbit-2"></div>
      <div class="orbit orbit-3"></div>
    </div>

    <!-- Twinkling Stars -->
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>

    <!-- Main Container -->
    <div class="container">
      <h1 class="welcome-text">Welcome!</h1>
      <p class="subtitle">Discover Your Academic Excellence</p>

      <div class="buttons">
        <a href="/form" class="btn btn-primary">Get Started</a>
        <a href="/grades" class="btn btn-secondary">View Grades</a>
      </div>
    </div>

    <!-- Decorative Lines -->
    <div class="line line-horizontal left"></div>
    <div class="line line-horizontal right"></div>

    <!-- Bouncing Arrow -->
    <div class="arrow">↓</div>
  </body>
</html>
